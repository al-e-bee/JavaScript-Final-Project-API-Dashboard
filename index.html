<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <title>API Dashboard Project</title>
</head>
<body>
    
    <h1 class = "main-title">JavaScript API Dashboard</h1>

    <div class="grid-container">
        <section class="grid-item" id = "dog-api">
            <h2>Random Dog</h2>
            <button id = "getDogImage">Get Dog</button>
            <div class="output" id = "dog-output"></div>
        </section>

        <section class="grid-item" id = "cat-api">
            <h2>Random Cat</h2>
            <button id = "getCatImage">Get Cat</button>
            <div class="output" id = "cat-output"></div>
        </section>

        <section class="grid-item" id =  "weather-api">
            <h2>Weather Info</h2>
            <button id = "getWeather">Get Weather</button>
            <div class="output" id = "weather-output"></div>
        </section>

        <section class="grid-item" id = "currency-api">
            <h2>Currency Rates</h2>
            <button id = "getExchangeRates">Get Rates</button>
            <div class="output" id = "currency-output"></div>
            <p class="attribution">Source: <a href="https://www.exchangerate-api.com" target="_blank">Rates By Exchange Rate API</a></p>
        </section>

         <section class="grid-item" id = "movies-api">
            <h2>Trending Movies</h2>
            <button id = "getMovies">Get Movies</button>
            <div class="output" id = "movies-output"></div>
        </section>

         <section class="grid-item" id = "github-api">
            <h2>GitHub User</h2>
            <button id = "getGitHubUser">Get User</button>
            <div class="output" id = "github-output"></div>
        </section>

         <section class="grid-item" id = "joke-api">
            <h2>Random Joke</h2>
            <button id = "getJoke">Get Joke</button>
            <div class="output" id = "joke-output"></div>
        </section>

         <section class="grid-item" id = "public-api">
            <h2>NASA API</h2>
            <button id = "getPublicApiInfo">Show One</button>
            <div class="output" id = "publicapi-output"></div>
        </section>

    </div>



</body>
</html>
